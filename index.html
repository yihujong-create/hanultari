<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0c0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="한울타리">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='32' fill='%230c0f1a'/><circle cx='96' cy='96' r='60' fill='%23e84949'/><circle cx='80' cy='80' r='6' fill='%230c0f1a'/><circle cx='110' cy='80' r='6' fill='%230c0f1a'/><circle cx='95' cy='105' r='6' fill='%230c0f1a'/></svg>">
<title>한울타리 볼링클럽</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
/* ── 변수 ── */
:root{
  --bg:#0c0f1a;--s1:#131928;--s2:#1b2236;--s3:#232f47;--bdr:#2d3d5c;
  --red:#e84949;--ora:#f0a832;--grn:#2ecc71;--blu:#4da6ff;--pur:#a78bfa;
  --txt:#eef2ff;--txt2:#8896b3
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

/* ════════════════════════════════════
   html/body: 단순하게 전체 크기만
   ════════════════════════════════════ */
html{
  width:100%;
  height:100%;
  overflow:hidden;
  overscroll-behavior:none;
}
body{
  position:fixed;
  top:0; left:0; right:0; bottom:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--txt);
  font-family:'Noto Sans KR',sans-serif;
  overscroll-behavior:none;
  margin:0;
  padding:0;
}

/* ════════════════════════════════════
   #app-wrap: 항상 화면 전체 (좌우 100%)
   PC/모바일 구분 없이 뷰포트 꽉 채움
   ════════════════════════════════════ */
#app-wrap{
  position:fixed;
  top:0; left:0; right:0; bottom:0;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  background:var(--bg);
}

/* ── 헤더: flex-shrink:0 으로 상단 고정 ── */
header{
  flex-shrink:0;
  width:100%;
  background:linear-gradient(160deg,#1a0808,var(--s1));
  border-bottom:1px solid rgba(232,73,73,.25);
  padding:10px 14px;
  padding-top:calc(10px + env(safe-area-inset-top,0px));
  z-index:100;
}
.hdr-row{display:flex;justify-content:space-between;align-items:center}
.hdr-logo{font-family:'Black Han Sans';font-size:20px;color:var(--red)}
.hdr-sync{width:28px;height:28px;background:var(--s2);border:1px solid var(--bdr);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer}
.hdr-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;cursor:pointer}
.hdr-meta{display:flex;gap:10px;margin-top:5px;font-size:11px;color:var(--txt2);flex-wrap:wrap}

/* ── 배너: flex-shrink:0 ── */
.banner{
  flex-shrink:0;
  width:100%;
  background:#0d2b1a;border-bottom:1px solid #1a5c35;
  padding:3px 10px;font-size:10px;color:var(--grn);
  text-align:center;font-weight:700;
}
.banner.warn{background:#1a1400;border-color:#5c4a1a;color:var(--ora)}

/* ── 콘텐츠: flex:1 으로 남은 공간 전부, 위아래만 스크롤 ── */
.pages{
  flex:1;
  min-height:0;             /* 필수: flex 자식이 줄어들 수 있도록 */
  width:100%;
  overflow-x:hidden;        /* 좌우 스크롤 완전 차단 */
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
}
.page{
  display:none;
  width:100%;
  overflow-x:hidden;
  padding:10px 10px calc(20px + env(safe-area-inset-bottom,0px));
}
.page.on{display:block;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ── 탭바: flex-shrink:0 으로 하단 고정, 좌우 꽉 균등 ── */
.bnav{
  flex-shrink:0;
  width:100%;
  display:flex;
  background:var(--s1);
  border-top:1px solid var(--bdr);
  padding-bottom:env(safe-area-inset-bottom,0px);
  overflow:hidden;
  z-index:100;
}
.bn{
  flex:1;
  min-width:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  background:none;
  border:none;
  cursor:pointer;
  color:var(--txt2);
  font-family:'Noto Sans KR',sans-serif;
  padding:8px 2px 6px;
}
.bn .ic{font-size:18px}
.bn .lb{font-size:8px;font-weight:600;white-space:nowrap}
.bn.on{color:var(--red)}

/* ── 공통 컴포넌트 ── */
.sl{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--txt2);margin:12px 0 7px;display:flex;align-items:center;gap:7px}
.sl::after{content:'';flex:1;height:1px;background:var(--bdr)}
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:12px;padding:12px;margin-bottom:10px}
.card-t{font-size:11px;font-weight:700;color:var(--txt2);margin-bottom:9px;display:flex;justify-content:space-between;align-items:center}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.sbox{background:var(--s2);border-radius:9px;padding:10px 4px;text-align:center;border:1px solid var(--bdr)}
.sv{font-size:18px;font-weight:900;line-height:1}.slb{font-size:9px;color:var(--txt2);margin-top:3px}
.sv.r{color:var(--red)}.sv.y{color:var(--ora)}.sv.g{color:var(--grn)}.sv.b{color:var(--blu)}

/* ── 탭 ── */
.tab2,.tab3{display:flex;gap:5px;margin-bottom:10px}
.tab-btn{flex:1;background:var(--s2);border:1px solid var(--bdr);border-radius:8px;padding:8px 4px;font-size:11px;font-weight:700;color:var(--txt2);cursor:pointer;text-align:center;font-family:'Noto Sans KR',sans-serif}
.tab-btn.on{background:#0d1e33;border-color:var(--red);color:var(--red)}

/* ── 팀 헤더 ── */
.team-hdr{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:9px;border:1px solid;margin-bottom:7px}
.team-hdr.a{background:#0d1e33;border-color:var(--blu)}
.team-hdr.b{background:#0d2b1a;border-color:var(--grn)}
.team-hdr.c{background:#2b0d0d;border-color:var(--red)}
.team-hdr.d{background:#1a0d2b;border-color:var(--pur)}
.team-hdr.n{background:var(--s2);border-color:var(--bdr)}
.thdr-nm{font-size:12px;font-weight:700}
.team-hdr.a .thdr-nm{color:var(--blu)}.team-hdr.b .thdr-nm{color:var(--grn)}
.team-hdr.c .thdr-nm{color:var(--red)}.team-hdr.d .thdr-nm{color:var(--pur)}.team-hdr.n .thdr-nm{color:var(--txt2)}
.thdr-stat{font-size:10px;color:var(--txt2);margin-left:auto}

/* ── 회원 리스트 행 ── */
.ml{display:flex;flex-direction:column;gap:5px}
.mr{background:var(--s2);border-radius:9px;padding:8px 11px;display:flex;align-items:center;border-left:3px solid var(--bdr)}
.mr.ta{border-left-color:var(--blu)}.mr.tb{border-left-color:var(--grn)}
.mr.tc{border-left-color:var(--red)}.mr.td{border-left-color:var(--pur)}.mr.tn{border-left-color:var(--txt2)}
.mr-idx{font-size:10px;color:var(--txt2);width:18px;flex-shrink:0;text-align:right;margin-right:7px}
.mr-nm{font-size:13px;font-weight:700;color:#fff;width:52px;flex-shrink:0}
.mr-info{flex:1;min-width:0}.mr-chips{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
.gchip{background:var(--s3);border-radius:4px;padding:2px 5px;font-size:10px;font-weight:600;color:#d0daf0}
.gchip.hi{background:rgba(232,73,73,.3);color:#ffaaaa}
.mr-score{text-align:right;flex-shrink:0}
.mr-avg{font-size:16px;font-weight:900;color:var(--ora)}
.mr-total{font-size:10px;color:var(--blu);font-weight:700;margin-top:1px}

/* ── 조 배지 ── */
.gb{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px}
.gb.ga{background:#0d1e33;color:var(--blu);border:1px solid var(--blu)}
.gb.gb2{background:#0d2b1a;color:var(--grn);border:1px solid var(--grn)}
.gb.gc{background:#2b0d0d;color:var(--red);border:1px solid var(--red)}
.gb.gd{background:#1a0d2b;color:var(--pur);border:1px solid var(--pur)}
.rb{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:#1a0d2b;color:var(--pur);border:1px solid var(--pur)}

/* ── 조 범례 ── */
.gl-legend{display:flex;gap:6px;margin-bottom:10px}
.gl-box{flex:1;border-radius:8px;padding:8px 4px;text-align:center;border:1px solid}
.gl-box.a{background:#0d1e33;border-color:var(--blu)}
.gl-box.b{background:#0d2b1a;border-color:var(--grn)}
.gl-box.c{background:#2b0d0d;border-color:var(--red)}
.gl-box.d{background:#1a0d2b;border-color:var(--pur)}
.gl-title{font-size:12px;font-weight:700}
.gl-box.a .gl-title{color:var(--blu)}.gl-box.b .gl-title{color:var(--grn)}
.gl-box.c .gl-title{color:var(--red)}.gl-box.d .gl-title{color:var(--pur)}

/* ── 입력 ── */
.fi,.fs{width:100%;background:var(--s2);border:1px solid var(--bdr);border-radius:9px;padding:9px 11px;color:var(--txt);font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;-webkit-appearance:none}
.fi:focus,.fs:focus{border-color:var(--blu)}.fs option{background:var(--s2)}
input[type=date]{color-scheme:dark}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

/* ── 점수 카드 ── */
.sc-card{background:var(--s2);border-radius:11px;padding:11px;margin-bottom:8px;border:1px solid var(--bdr)}
.sc-hdr{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.sc-nm{font-size:13px;font-weight:700;color:#fff;width:52px;flex-shrink:0}
.sc-team{font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px}
.sc-team.a{background:#0d1e33;color:var(--blu)}.sc-team.b{background:#0d2b1a;color:var(--grn)}
.sc-team.c{background:#2b0d0d;color:var(--red)}.sc-team.d{background:#1a0d2b;color:var(--pur)}.sc-team.n{background:var(--s3);color:var(--txt2)}
.abs-tog{background:var(--s3);border:1px solid var(--bdr);border-radius:5px;padding:2px 8px;font-size:9px;color:var(--txt2);cursor:pointer;margin-left:auto}
.abs-tog.absent{background:#2b0d0d;border-color:var(--red);color:var(--red)}
.sgi{display:grid;gap:5px}
.sgf{display:flex;flex-direction:column;align-items:center;gap:2px}
.sgf label{font-size:9px;color:var(--txt2)}
.sgf input{width:100%;background:var(--s3);border:1px solid var(--bdr);border-radius:6px;padding:7px 2px;font-size:16px;font-weight:700;text-align:center;color:#fff;outline:none;font-family:'Noto Sans KR',sans-serif}
.sgf input.hi{border-color:rgba(232,73,73,.5);color:#ffaaaa}
.sgf input:focus{border-color:var(--blu)}
.sgf input::placeholder{color:var(--bdr);font-size:12px;font-weight:400;text-align:center}
.sgf input:placeholder-shown{background:var(--s2);border-color:var(--bdr);}
.sgf input:not(:placeholder-shown){background:var(--s3);}
.sc-sum{margin-top:7px;font-size:10px;color:var(--txt2);display:flex;gap:8px;flex-wrap:wrap}

/* ── 벌금 행 ── */
.fil{border-radius:6px;padding:5px 9px;margin-top:6px;display:flex;justify-content:space-between;align-items:center;gap:6px}
.fil.bad{background:#1a0505;border:1px solid rgba(232,73,73,.3)}
.fil.ok{background:#001a0a;border:1px solid rgba(46,204,113,.3)}
.fi-l{font-size:9px;flex:1;line-height:1.4}.fi-l.bad{color:#ffaaaa}.fi-l.ok{color:var(--grn)}
.fi-r{display:flex;align-items:center;gap:5px;flex-shrink:0}
.fi-amt{font-size:11px;font-weight:700}.fi-amt.bad{color:var(--red)}.fi-amt.ok{color:var(--grn)}
.fi-chk{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}
.fi-chk.paid{background:#0d2b1a;border:1px solid var(--grn);color:var(--grn)}
.fi-chk.unpaid{background:#1a0505;border:1px solid var(--red);color:var(--red)}

/* ── 벌금 목록 ── */
.fc{background:var(--s2);border-radius:10px;padding:10px;margin-bottom:8px;border:1px solid rgba(232,73,73,.25)}
.fn-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--bdr)}
.fn-row:last-child{border:none}
.fn-nm{font-size:11px;font-weight:700;color:#fff}
.fn-why{font-size:10px;color:var(--txt2)}
.fn-bad{font-size:12px;font-weight:700;color:var(--red)}
.fn-total{display:flex;justify-content:space-between;margin-top:6px;padding-top:6px;border-top:1px solid var(--bdr);font-size:11px}

/* ── 순위 ── */
.rk{background:var(--s2);border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:8px}
.rk-n{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;flex-shrink:0;background:var(--s3);color:var(--txt2)}
.rk-n.g1{background:rgba(240,168,50,.2);color:var(--ora);font-size:16px}
.rk-n.g2{background:rgba(192,192,192,.2);color:#b0bdd0;font-size:16px}
.rk-n.g3{background:rgba(205,127,50,.2);color:#cd7f32;font-size:16px}
.rk-nm{font-size:13px;font-weight:700;color:#fff;width:52px;flex-shrink:0}
.rk-info{flex:1;min-width:0}
.rk-sub{font-size:9px;color:var(--txt2);margin-top:2px}
.rk-r{text-align:right;flex-shrink:0}
.rk-total{font-size:15px;font-weight:900;color:var(--ora)}
.rk-avg{font-size:9px;color:var(--blu);font-weight:700}

/* ── 시상 ── */
.aw-card{background:var(--s2);border-radius:11px;padding:12px;margin-bottom:8px;border:1px solid rgba(240,168,50,.3)}
.aw-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.aw-row:last-child{margin-bottom:0}
.aw-hdr{font-size:11px;font-weight:700;color:var(--ora);margin-bottom:8px}
.aw-nm{font-size:13px;font-weight:700;color:#fff}
.aw-sub{font-size:9px;color:var(--txt2);margin-top:2px}
.aw-val{font-size:16px;font-weight:900}
.aw-val.g{color:var(--grn)}.aw-val.gray{color:var(--txt2);font-size:12px}
.eb{font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;background:#1a2a0a;color:var(--grn);border:1px solid var(--grn)}
.eb.no{background:#1a0a0a;color:var(--red);border-color:var(--red)}
.adm-b{display:inline-flex;align-items:center;gap:3px;background:#1a0d2b;border:1px solid var(--pur);border-radius:5px;padding:2px 7px;font-size:9px;color:var(--pur);font-weight:700;cursor:pointer}

/* ── 성적 테이블 ── */
.hist-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:9px;border:1px solid var(--bdr);margin-bottom:10px}
.htbl{width:100%;border-collapse:collapse;font-size:10px;white-space:nowrap}
.htbl th{background:var(--s3);color:var(--txt2);padding:6px 5px;font-weight:700;text-align:center;border-bottom:1px solid var(--bdr)}
.htbl td{padding:5px;text-align:center;border-bottom:1px solid rgba(45,61,92,.4);color:var(--txt)}
.htbl tr:last-child td{border-bottom:none}
.htbl tr:nth-child(even) td{background:rgba(27,34,54,.5)}
.hnm{text-align:left!important;padding-left:8px!important;font-weight:700;white-space:nowrap}
.hhi{color:var(--red);font-weight:700}
.hora{color:var(--ora);font-weight:700}

/* ── 장부 ── */
.fr{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid rgba(45,61,92,.4)}
.fr:last-child{border:none}
.fr-l{flex:1;font-size:11px;color:var(--txt2)}
.fr-v{font-size:12px;font-weight:700;cursor:pointer}
.fr-v.inc{color:var(--grn)}.fr-v.exp{color:var(--red)}.fr-v.bal{color:var(--blu)}
.fr-del{color:var(--red);font-size:12px;cursor:pointer;padding:2px 5px;opacity:.6}
.add-row{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.add-inp{background:var(--s2);border:1px solid var(--bdr);border-radius:7px;padding:7px 9px;color:var(--txt);font-size:12px;outline:none;font-family:'Noto Sans KR',sans-serif}
.add-inp.nm{flex:1;min-width:80px}.add-inp.amt{width:80px}
.add-btn{padding:7px 11px;border-radius:7px;border:none;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit}
.add-btn.inc{background:#0d2b1a;color:var(--grn);border:1px solid var(--grn)}
.add-btn.exp{background:#2b0d0d;color:var(--red);border:1px solid var(--red)}
.cb-sel{display:flex;gap:4px}
.cb-btn{padding:5px 10px;border-radius:6px;border:1px solid var(--bdr);font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;background:var(--s2);color:var(--txt2)}
.cb-btn.on{background:var(--s3);border-color:var(--blu);color:var(--blu)}

/* ── 회비 표 ── */
.due-legend{display:flex;gap:10px;margin-bottom:8px;font-size:11px;color:var(--txt2);flex-wrap:wrap}
.due-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:9px;border:1px solid var(--bdr);margin-bottom:10px}
.dtbl{width:100%;border-collapse:collapse;font-size:9px;white-space:nowrap}
.dtbl th{background:var(--s3);color:var(--txt2);padding:4px 3px;font-weight:700;text-align:center;border-bottom:1px solid var(--bdr)}
.dtbl td{padding:3px;text-align:center;border-bottom:1px solid rgba(45,61,92,.4)}
.dtbl tr:last-child td{border-bottom:none}
.dnm{text-align:left!important;padding-left:6px!important;font-weight:700;color:#fff;white-space:nowrap}
.dc{display:inline-block;border-radius:3px;padding:2px 4px;font-size:8px;font-weight:700;cursor:pointer;border:1px solid transparent;min-width:18px;text-align:center}
.dc.c.on{background:#0d2b1a;border-color:var(--grn);color:var(--grn)}
.dc.k.on{background:#0d1e33;border-color:var(--blu);color:var(--blu)}
.dc.off{background:var(--s3);color:var(--txt2);border-color:var(--bdr)}

/* ── 회원관리 ── */
.av-row{background:var(--s2);border-radius:9px;padding:8px 11px;display:flex;align-items:center;gap:6px;border:1px solid var(--bdr);flex-wrap:wrap}
.av-nm{font-size:13px;font-weight:700;color:#fff;width:52px;flex-shrink:0}
.av-info{flex:1;min-width:0;font-size:10px;color:var(--txt2)}
.av-box{background:var(--s3);border:1px solid var(--bdr);border-radius:5px;padding:5px 2px;font-size:14px;font-weight:700;text-align:center;color:#fff;outline:none;font-family:'Noto Sans KR',sans-serif;width:50px}
.av-grade{flex-shrink:0}

/* ── 설정 카드 ── */
.gs-hero{background:var(--s2);border:1px solid var(--bdr);border-radius:12px;padding:14px;margin-bottom:10px;position:relative;overflow:hidden}
.gs-bg{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:60px;opacity:.1;pointer-events:none}
.gs-ht{font-size:11px;font-weight:700;color:var(--txt2);margin-bottom:10px}
.gs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.gs-box{border-radius:8px;padding:8px 4px;text-align:center;border:1px solid}
.gs-box.b{background:#0d1e33;border-color:var(--blu)}.gs-box.o{background:#1a1200;border-color:var(--ora)}
.gs-box.g{background:#0d2b1a;border-color:var(--grn)}.gs-box.p{background:#1a0d2b;border-color:var(--pur)}
.gs-ic{font-size:14px}.gs-lbl{font-size:7px;color:var(--txt2)}.gs-vl{font-size:16px;font-weight:900;line-height:1.2}.gs-ut{font-size:7px;font-weight:700}
.gs-box.b .gs-vl,.gs-box.b .gs-ut{color:var(--blu)}.gs-box.o .gs-vl,.gs-box.o .gs-ut{color:var(--ora)}
.gs-box.g .gs-vl,.gs-box.g .gs-ut{color:var(--grn)}.gs-box.p .gs-vl,.gs-box.p .gs-ut{color:var(--pur)}
.gs-sum{background:var(--s3);border-radius:8px;padding:10px}
.gs-st{font-size:10px;color:var(--txt2);font-weight:700;margin-bottom:6px}
.gs-sr{display:flex;justify-content:space-between;font-size:10px;padding:2px 0}
.gs-sl{color:var(--txt2)}.gs-sv{color:var(--txt);font-weight:700}
.gs-stot{display:flex;justify-content:space-between;font-size:11px;font-weight:700;margin-top:6px;padding-top:6px;border-top:1px solid var(--bdr)}
.gs-stl{color:var(--txt2)}.gs-stv{color:var(--grn)}
.gs-gsel{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:10px}
.gs-gbtn{background:var(--s1);border:1px solid var(--bdr);border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer}
.gs-gbtn.on{background:#0d1e33;border-color:var(--blu)}
.gs-gnum{font-size:18px;font-weight:900;color:var(--txt2)}.gs-gbtn.on .gs-gnum{color:var(--blu)}
.gs-glb{font-size:8px;color:var(--txt2);margin-top:2px}.gs-gbtn.on .gs-glb{color:var(--blu)}

/* ── 설정 입력 카드 ── */
.cc{border-radius:11px;padding:12px;margin-bottom:8px;border:1px solid}
.cc.blue{background:#020f1a;border-color:rgba(77,166,255,.3)}.cc.ora{background:#1a0f00;border-color:rgba(240,168,50,.3)}
.cc.red{background:#1a0202;border-color:rgba(232,73,73,.3)}.cc.grn{background:#001a05;border-color:rgba(46,204,113,.3)}
.cc.pur{background:#10011a;border-color:rgba(167,139,250,.3)}.cc.gray{background:var(--s2);border-color:var(--bdr)}
.cc-hdr{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.cc-icon{font-size:14px}.cc-title{font-size:12px;font-weight:700;color:#fff}
.cc-desc{font-size:10px;color:var(--txt2);margin-bottom:4px}
.cc-ex{font-size:9px;color:var(--txt2);margin-bottom:8px;padding:4px 7px;background:var(--s3);border-radius:5px}
.cc-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0}
.cc-lbl{font-size:11px;color:var(--txt2)}
.cc-grp{display:flex;align-items:center;gap:5px}

.cc-inp.ora{background:#1a1200;border-color:var(--ora);color:var(--ora)}
.cc-inp.red{background:#1a0505;border-color:var(--red);color:var(--red)}
.cc-inp.grn{background:#0d2b1a;border-color:var(--grn);color:var(--grn)}
.cc-inp.pur{background:#1a0d2b;border-color:var(--pur);color:var(--pur)}
.cc-inp.dim{background:var(--s3);border-color:var(--bdr);color:var(--txt2)}
.cc-sfx{font-size:10px;color:var(--txt2);white-space:nowrap}
.idiv{height:1px;background:var(--bdr);margin:2px 0}

/* ── 토글 ── */
.tog-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--s2);border-radius:9px;margin-bottom:6px;border:1px solid var(--bdr)}
.tog-icon{font-size:16px;flex-shrink:0}
.tog-info{flex:1}.tog-name{font-size:12px;font-weight:700;color:#fff}.tog-desc{font-size:9px;color:var(--txt2)}
.tog{width:38px;height:22px;border-radius:11px;border:1px solid var(--bdr);position:relative;cursor:pointer;flex-shrink:0;transition:background .2s}
.tog.on{background:var(--grn);border-color:var(--grn)}.tog.off{background:var(--s3)}
.tog-dot{position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:2px;transition:left .2s}
.tog.on .tog-dot{left:18px}.tog.off .tog-dot{left:2px}

/* ── 회칙 ── */
.ca{font-size:12px;font-weight:700;color:var(--ora);margin:12px 0 5px}
.cc2{font-size:11px;color:#b0bdd0;line-height:1.9;padding-left:9px;border-left:2px solid var(--bdr);margin-bottom:5px}

/* ── 기타 ── */
.note{border-radius:9px;padding:8px 11px;font-size:11px;margin-bottom:9px;line-height:1.5}
.note.y{background:#1a1400;border:1px solid rgba(240,168,50,.3);color:var(--ora)}
.note.b{background:#001220;border:1px solid rgba(77,166,255,.3);color:var(--blu)}
.note.r{background:#1a0505;border:1px solid rgba(232,73,73,.3);color:var(--red)}

.chip{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid;cursor:pointer;display:inline-block;user-select:none}
.chip.on{background:var(--red);border-color:var(--red);color:#fff}
.chip.off{background:var(--s2);border-color:var(--bdr);color:var(--txt2)}

.btn{width:100%;padding:12px;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:14px;font-family:'Noto Sans KR',sans-serif}
.btn.r{background:var(--red);color:#fff}.btn.s{background:var(--s2);color:var(--txt);border:1px solid var(--bdr)}.btn.b{background:var(--blu);color:#051020}

.sep{height:1px;background:var(--bdr);margin:8px 0}

/* ── 메뉴 ── */
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}

.menu-box:active{border-color:var(--red)}

/* ── 토스트 ── */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--s1);border:1px solid var(--bdr);color:var(--txt);padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;z-index:600;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.6);max-width:90vw}

<!-- Firebase 실시간 동기화 -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
// ✅ Firebase 설정값
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCfW2yfHGi62mNE23lJmnmrPDjAhWvblNs",
  authDomain:        "hanultari-f2439.firebaseapp.com",
  databaseURL:       "https://hanultari-f2439-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "hanultari-f2439",
  storageBucket:     "hanultari-f2439.firebasestorage.app",
  messagingSenderId: "54631756791",
  appId:             "1:54631756791:web:be52231dcc9af64153b4f2"
};

const FB_NODE   = 'hanultari';
const LOCAL_KEY = 'hanultari_v2';
let   fbRef     = null;
let   fbReady   = false;
let   _isSaving = false;

function _showBanner(msg, warn){
  const b=document.getElementById('syncBanner');
  if(!b){ setTimeout(()=>_showBanner(msg,warn),200); return; }
  b.textContent=msg;
  b.classList.toggle('warn',!!warn);
}

function _applyRemote(raw){
  if(!raw||typeof raw!=='object') return;
  if(_isSaving) return;
  try{
    if(window.DB){
      Object.keys(window.DB).forEach(k=>delete window.DB[k]);
      Object.assign(window.DB, raw);
    }
    localStorage.setItem(LOCAL_KEY, JSON.stringify(raw));
    const t=new Date(raw._ts||Date.now());
    const ts=String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0');
    _showBanner('🔄 실시간 갱신 — '+ts+' (다른 기기 업데이트)');
    if(window._appReady){
      window.updateHeader&&window.updateHeader();
      window.renderPage&&window.renderPage(window._curPage||'dash');
    }
  }catch(e){ console.warn('Firebase 수신 처리 오류:', e); }
}

function _initFirebase(){
  try{
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    const db = firebase.database();
    fbRef = db.ref(FB_NODE);

    fbRef.on('value',
      snap=>{ if(snap.exists()) _applyRemote(snap.val()); },
      err=>{ console.error('Firebase 수신 오류:',err); _showBanner('⚠️ Firebase 수신 오류',true); }
    );

    fbReady = true;
    window._fbConfigured = true;
    _showBanner('☁️ Firebase 연결됨 — 실시간 동기화 활성');
  }catch(e){
    console.error('Firebase 초기화 실패:',e);
    _showBanner('⚠️ Firebase 연결 실패 — 설정 확인 필요',true);
  }
}

// app.js의 saveDB()에서 호출
window.fbSave = function(data){
  if(!fbReady||!fbRef) return;
  _isSaving = true;
  fbRef.set(data)
    .then(()=>{ setTimeout(()=>{ _isSaving=false; }, 2000); })
    .catch(e=>{ console.warn('Firebase 저장 실패:',e); _showBanner('⚠️ 클라우드 저장 실패',true); _isSaving=false; });
};

window._fbConfigured = true;

// DOM 준비 후 Firebase 초기화
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded', _initFirebase);
}else{
  _initFirebase();
}
</script>

<script src="./app.js"></script>
</body>
